<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodFriends - Email confirme</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f6f4;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#FF6B35;padding:24px 24px 28px;text-align:center;position:relative;overflow:hidden}
    .header::before{content:'';position:absolute;inset:0;background:rgba(255,107,53,0.2)}
    .header h1{position:relative;z-index:1;color:#fff;font-size:24px;font-weight:900;letter-spacing:-0.5px}
    .content{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px;max-width:480px;margin:0 auto;width:100%}
    .illustration{width:120px;height:120px;background:rgba(255,107,53,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:28px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .check-icon{width:60px;height:60px;background:#FF6B35;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pop 0.5s ease-out}
    @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
    .check-icon svg{width:32px;height:32px}
    .card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
    .card h2{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
    .card p{font-size:15px;color:#666;line-height:1.5;margin-bottom:24px}
    .btn{display:inline-block;background:#FF6B35;color:#fff;font-size:16px;font-weight:700;padding:16px 32px;border-radius:16px;text-decoration:none;box-shadow:0 6px 16px rgba(255,107,53,0.35);width:100%;transition:transform 0.15s}
    .btn:hover{transform:translateY(-1px)}
    .hints{margin-top:32px;display:flex;flex-direction:column;gap:10px}
    .hint{display:flex;align-items:center;gap:8px;font-size:13px;color:#888;font-weight:500}
    .footer{text-align:center;padding:24px;color:#aaa;font-size:12px}
  </style>
</head>
<body>
  <div class="header"><h1>FoodFriends</h1></div>
  <div class="content">
    <div class="illustration"><div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div></div>
    <div class="card">
      <h2>Email confirme !</h2>
      <p>Ton adresse email a bien ete verifiee. Retourne dans l'application pour finaliser ton profil.</p>
      <a href="foodfriends://" class="btn">Ouvrir FoodFriends</a>
    </div>
    <div class="hints">
      <div class="hint"><span>📱</span><span>Retourne dans l'appli, la redirection est automatique</span></div>
      <div class="hint"><span>🍽️</span><span>Bientot ton premier repas entre amis !</span></div>
    </div>
  </div>
  <div class="footer">&copy; 2026 FoodFriends — Partage un repas, fais-toi des amis</div>
</body>
</html>
